shell /bin/zsh

# === FONT ===
font_family      MesloLGS NF
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        14.0

# === GRUVBOX ===
background       #282828
foreground       #ebdbb2
selection_background #504945
selection_foreground #ebdbb2
url_color        #83a598
cursor           #d79921
cursor_text_color #282828
active_tab_background #3c3836
active_tab_foreground #ebdbb2
inactive_tab_background #282828
inactive_tab_foreground #a89984
color0           #282828
color1           #cc241d
color2           #98971a
color3           #d79921
color4           #458588
color5           #b16286
color6           #689d6a
color7           #a89984
color8           #928374
color9           #fb4934
color10          #b8bb26
color11          #fabd2f
color12          #83a598
color13          #d3869b
color14          #8ec07c
color15          #ebdbb2

# === DISABLE SOUND ===
enable_audio_bell no
visual_bell_duration 0.0
bell_on_tab no

# === CURSOR ===
cursor_shape block
cursor_blink_interval 0

# === SCROLLBACK ===
scrollback_lines 10000

# === PERFORMANCE ===
repaint_delay 10
input_delay 3

# === OPTIONAL (чистый вид) ===
disable_ligatures never
